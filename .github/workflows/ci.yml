name: CI

on:
  push:
    branches: [master, main, "feat/*", "feature/*"]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -o gh-select .

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Verify version flag
        run: ./gh-select --version
