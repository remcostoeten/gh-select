name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & publish precompiled binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Cross-compiles gh-select for every supported platform and attaches the
      # binaries to the release so `gh extension install` can fetch the right
      # one. Builds with -X main.version=<tag> for accurate `--version`.
      - name: Build & release
        uses: cli/gh-extension-precompile@v2
        with:
          go_version_file: go.mod
          go_build_options: '-trimpath -ldflags=-s -ldflags=-w -ldflags=-X=main.version=${{ github.ref_name }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
